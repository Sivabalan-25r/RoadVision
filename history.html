<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvasionEye — History</title>
  <meta name="description" content="EvasionEye detection history — browse all scanned vehicles, registrations, violations, and timestamps." />
  <style>
    html,body{background:#020617;margin:0;padding:0;}
    .plate-thumbnail {
      width: 120px;
      height: 40px;
      overflow: hidden;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .plate-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .plate-thumbnail-placeholder {
      width: 120px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--slate-800);
      color: var(--text-muted);
      font-size: 11px;
      border-radius: var(--radius-sm);
      border: 1px dashed var(--border-color);
    }
    .plate-number {
      font-family: 'Roboto Mono', monospace;
      letter-spacing: 1px;
      font-weight: 700;
      color: var(--primary);
      background: var(--primary-glow);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid rgba(59,130,246,0.3);
    }
    
    /* Utility & Layout Classes */
    .mb-24 { margin-bottom: 24px; }
    .flex-gap-10 { display: flex; gap: 10px; align-items: center; }
    .history-badge { background: var(--surface-secondary); color: var(--text); }
    .btn-export { display: none; gap: 6px; padding: 8px 16px; font-size: 13px; }
    .icon-small { font-size: 16px; }
    .centered-state { text-align: center; padding: 60px 20px; }
    .icon-large { font-size: 48px; color: var(--text-muted); margin-bottom: 16px; }
    .state-text { color: var(--text-muted); font-size: 14px; }
    .state-title { margin-bottom: 8px; color: var(--text); }
    .hidden { display: none; }
    .table-scroll { overflow-x: auto; }
    .text-right { text-align: right; }
  </style>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <!-- jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar Slot -->
    <div id="sidebar-slot"></div>

    <!-- Main Area -->
    <div class="main-area">
      <!-- Header Slot -->
      <div id="header-slot"></div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="section-header mb-24">
          <h2>Detection History</h2>
          <div class="flex-gap-10">
            <span class="badge history-badge" id="historyCount">
              <span id="historyNumber">0</span> Records
            </span>
            <button class="btn-primary btn-export" id="exportPdfBtn">
              <span class="material-symbols-outlined icon-small">picture_as_pdf</span>
              Export PDF
            </button>
          </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="centered-state">
          <div class="icon-large">
            <span class="material-symbols-outlined icon-large">hourglass_empty</span>
          </div>
          <p class="state-text">Loading history...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="centered-state hidden">
          <div class="icon-large">
            <span class="material-symbols-outlined icon-large">history</span>
          </div>
          <h3 class="state-title">No History Yet</h3>
          <p class="state-text">
            Detections will appear here after analyzing a video or using live monitoring.
          </p>
        </div>

        <!-- History Table -->
        <div class="card hidden" id="historyTable" data-glare="false">
          <div class="table-scroll">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Plate ID</th>
                  <th>Plate Image</th>
                  <th>Corrected Plate</th>
                  <th>Status</th>
                  <th>Confidence</th>
                  <th>Time / Frame</th>
                  <th class="text-right">Actions</th>
                </tr>
              </thead>
              <tbody id="historyTableBody">
                <!-- Rows will be dynamically inserted -->
              </tbody>
            </table>
          </div>
        </div>
        <!-- Pagination -->
        <div class="pagination">
          <div class="pagination-info" id="pagination-info">
            Showing 0 to 0 of 0 entries
          </div>
          <div class="pagination-controls" id="pagination-controls"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Evidence Modal -->
  <div class="evidence-modal" id="evidenceModal">
    <div class="evidence-modal-content">
      <button class="evidence-modal-close" id="evidenceModalClose">
        <span class="material-symbols-outlined">close</span>
      </button>
      <img id="evidenceModalImg" src="" alt="Evidence frame" />
      <div class="evidence-modal-details" id="evidenceModalDetails"></div>
    </div>
  </div>

  <script src="components/loader.js"></script>
  <script src="components/evidence-store.js"></script>
  <script src="components/glare-hover.js"></script>
  <script src="components/pagination.js"></script>
  <script src="api-client.js"></script>
  <script>
    // ============ Load Real History ============
    const historyTableBody = document.getElementById('historyTableBody');
    const historyTable = document.getElementById('historyTable');
    const loadingState = document.getElementById('loadingState');
    const emptyState = document.getElementById('emptyState');
    const historyNumber = document.getElementById('historyNumber');

    async function loadHistory() {
      try {
        // Get all detections from database
        const detections = await EvasionEyeAPI.Detection.getAll(false, 100);
        
        if (detections.length === 0) {
          loadingState.style.display = 'none';
          emptyState.style.display = 'block';
          return;
        }

        // Update count
        historyNumber.textContent = detections.length;

        // Render table rows
        historyTableBody.innerHTML = detections.map((det, index) => {
          const confidence = Math.round(det.confidence * 100);
          const vList = (det.violations && det.violations.length > 0) ? det.violations : (det.violation ? [det.violation] : []);
          const badgeClass = vList.length > 0 ? 'alert' : 'success';
          const timeStr = det.timestamp ? new Date(det.timestamp).toLocaleTimeString('en-US', { hour12: false }) : `Frame ${det.frame}`;
          
          // Thumbnail logic - fixed double prefixing
          const hasPrefix = det.plate_image && det.plate_image.startsWith('data:image');
          const imgSrc = hasPrefix ? det.plate_image : (det.plate_image ? `data:image/jpeg;base64,${det.plate_image}` : '');
          
          const thumbnailHtml = imgSrc 
            ? `<div class="plate-thumbnail"><img src="${imgSrc}" alt="Plate" /></div>`
            : `<div class="plate-thumbnail-placeholder">No Image</div>`;

          const correctedDisplay = det.correct_plate ? 
            `<span style="color:var(--warning); font-weight:600;">${det.correct_plate}</span>` : 
            '<span style="color:var(--text-muted)">—</span>';
          
          // Font anomaly badge
          const fontBadge = det.font_anomaly ? 
            '<span class="badge warning" style="font-size:10px; margin-left:4px;">Non-Standard Font</span>' : '';

          return `
            <tr>
              <td><span class="plate-number">${det.detected_plate}</span>${fontBadge}</td>
              <td>${thumbnailHtml}</td>
              <td>${correctedDisplay}</td>
              <td>
                <div style="display:flex; flex-direction:column; gap:4px;">
                  ${vList.length > 0 
                    ? vList.map(v => `<span class="badge ${badgeClass}" style="font-size: 10px; padding: 2px 6px;">${v}</span>`).join('')
                    : `<span class="badge ${badgeClass}">LEGAL</span>`
                  }
                </div>
              </td>
              <td style="color:var(--success); font-weight:600;">${confidence}%</td>
              <td style="color:var(--text-muted); font-size:12px;">${timeStr}</td>
              <td style="text-align:right">
                <button class="icon-btn" onclick="viewIncidentDetails(${index})">
                  <span class="material-symbols-outlined">visibility</span>
                </button>
              </td>
            </tr>
          `;
        }).join('');

        // Show table, hide loading
        loadingState.style.display = 'none';
        historyTable.classList.remove('hidden');
        historyTable.style.display = 'block';
        document.getElementById('exportPdfBtn').style.display = 'inline-flex';

        // Refresh pagination for new rows
        if (window.refreshPagination) {
          window.refreshPagination();
        }

        // Store detections globally for PDF export and modal access
        window._historyDetections = detections;

      } catch (e) {
        console.error('Error loading history:', e);
        loadingState.style.display = 'none';
        emptyState.style.display = 'block';
      }
    }

    // ============ Evidence Modal Logic ============
    const evidenceModal = document.getElementById('evidenceModal');
    const evidenceModalImg = document.getElementById('evidenceModalImg');
    const evidenceModalDetails = document.getElementById('evidenceModalDetails');
    const evidenceModalClose = document.getElementById('evidenceModalClose');

    evidenceModalClose.addEventListener('click', () => {
      evidenceModal.classList.remove('active');
    });
    evidenceModal.addEventListener('click', (e) => {
      if (e.target === evidenceModal) evidenceModal.classList.remove('active');
    });

    function viewIncidentDetails(index) {
      const det = window._historyDetections[index];
      if (!det) return;

      const plate = det.detected_plate;
      const corrected = det.correct_plate || '';
      const vList = (det.violations && det.violations.length > 0) ? det.violations : (det.violation ? [det.violation] : []);
      const violation = vList.join(', ') || 'None';
      const confidence = Math.round(det.confidence * 100);
      
      // Use plate_image from database if available, otherwise try evidence store
      let imgSrc = det.plate_image || '';
      if (imgSrc && !imgSrc.startsWith('data:image')) {
        imgSrc = `data:image/jpeg;base64,${imgSrc}`;
      }
      
      if (!imgSrc) {
        const evidence = getEvidenceByPlate(plate);
        imgSrc = evidence ? evidence.image : '';
      }

      if (imgSrc) {
        evidenceModalImg.src = imgSrc;
        evidenceModalImg.style.display = 'block';
      } else {
        evidenceModalImg.src = '';
        evidenceModalImg.style.display = 'none';
      }

      evidenceModalDetails.innerHTML = `
        ${!imgSrc ? '<p style="padding:24px 0 8px; text-align:center; color:var(--text-muted); font-size:13px;"><span class="material-symbols-outlined" style="font-size:32px; display:block; margin-bottom:8px;">image_not_supported</span>No evidence frame captured yet.</p>' : ''}
        <div class="detection-row">
          <span class="detection-label">Detected Plate</span>
          <span class="plate-number">${plate}</span>
        </div>
        <div class="detection-row">
          <span class="detection-label">Correct Plate</span>
          <span class="detection-value">${corrected}</span>
        </div>
        <div class="detection-row">
          <span class="detection-label">Violation</span>
          <span class="badge alert">${violation}</span>
        </div>
        <div class="detection-row">
          <span class="detection-label">Confidence</span>
          <span class="detection-value" style="color:var(--success); font-weight:600;">${confidence}%</span>
        </div>
      `;
      evidenceModal.classList.add('active');
    }

    // Load history on page load
    window.addEventListener('load', loadHistory);

    // ============ PDF Export ============
    document.getElementById('exportPdfBtn').addEventListener('click', generatePDF);

    function generatePDF() {
      const detections = window._historyDetections;
      if (!detections || detections.length === 0) {
        alert('No detections to export.');
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'a4');
      const PW = doc.internal.pageSize.getWidth();   // 210
      const PH = doc.internal.pageSize.getHeight();  // 297

      // ─── Color palette ───────────────────────────────────────────
      const C = {
        navy:    [2,  6,  23],
        brand:   [99, 102, 241],
        brandDk: [67, 56, 202],
        red:     [220, 38, 38],
        green:   [22, 163, 74],
        orange:  [234, 88, 12],
        yellow:  [202, 138, 4],
        muted:   [100, 116, 139],
        light:   [241, 245, 249],
        white:   [255, 255, 255],
        dark:    [15, 23, 42],
        border:  [203, 213, 225],
      };

      // ─── Utility helpers ─────────────────────────────────────────
      const now = new Date();
      const dateStr = now.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
      const timeStr = now.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

      function addPageHeader(doc, pageLabel) {
        doc.setFillColor(...C.navy);
        doc.rect(0, 0, PW, 16, 'F');
        doc.setFillColor(...C.brand);
        doc.rect(0, 14, PW, 2, 'F');
        doc.setFontSize(9); doc.setTextColor(...C.brand);
        doc.setFont('helvetica', 'bold');
        doc.text('EvasionEye', 10, 10);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...C.muted);
        doc.setFontSize(7);
        doc.text('ANPR Security Detection Report', 10, 13.5);
        doc.setFontSize(7);
        doc.text(pageLabel, PW - 10, 10, { align: 'right' });
        doc.text(`${dateStr} ${timeStr}`, PW - 10, 13.5, { align: 'right' });
      }

      function addPageFooter(doc) {
        const pg = doc.internal.getCurrentPageInfo().pageNumber;
        const total = doc.internal.getNumberOfPages();
        doc.setFillColor(...C.light);
        doc.rect(0, PH - 10, PW, 10, 'F');
        doc.setFontSize(7); doc.setTextColor(...C.muted);
        doc.text('Generated by EvasionEye ANPR Monitoring System — Law Enforcement Use Only', PW / 2, PH - 4, { align: 'center' });
        doc.text(`Page ${pg} of ${total}`, PW - 10, PH - 4, { align: 'right' });
      }

      function sectionTitle(doc, y, label) {
        doc.setFillColor(...C.brand);
        doc.rect(10, y, 3, 6, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10); doc.setTextColor(...C.dark);
        doc.text(label, 15, y + 4.5);
        return y + 9;
      }

      function drawProgressBar(doc, x, y, w, h, pct, color) {
        doc.setFillColor(...C.border);
        doc.roundedRect(x, y, w, h, 1, 1, 'F');
        if (pct > 0) {
          doc.setFillColor(...color);
          doc.roundedRect(x, y, w * pct, h, 1, 1, 'F');
        }
      }

      function violationAnalysis(det) {
        const v = det.violation || '';
        const plate = det.detected_plate || 'Unknown';
        const corrected = det.correct_plate || '';
        if (v.includes('Character Manipulation') || v.includes('Non-Standard Font / Character Manipulation')) {
          return `Plate "${plate}" was flagged because one or more characters appear to have been deliberately substituted to evade ANPR recognition. ${corrected ? `The system reconstructed the plate as "${corrected}".` : ''} Common manipulation: replacing letters with visually similar numbers (O→0, I→1, B→8) or vice versa.`;
        }
        if (v.includes('Non-Standard Font')) {
          return `Plate "${plate}" uses a non-standard typeface that does not conform to HSRP-mandated Charles Wright font regulations. Fancy, italic, or decorative fonts on number plates are illegal under MV Act provisions.`;
        }
        if (v.includes('Tampered')) {
          return `Plate "${plate}" shows signs of physical tampering or deliberate character alteration. Multiple character inconsistencies were detected simultaneously, indicating intentional modification to obscure the vehicle's registered identity.`;
        }
        if (v.includes('Spacing Manipulation')) {
          return `Plate "${plate}" contains unusual spacing between character groups that deviates from standard MV Act formatting. This technique is used to confuse ANPR systems and manual verification by disrupting the standard AA-NN-AA-NNNN structure.`;
        }
        if (v.includes('Pattern Mismatch')) {
          return `Plate "${plate}" does not conform to the standard Indian vehicle registration format (State Code + District Code + Series + Number). This may indicate an unregistered, forged, or foreign-registered vehicle.`;
        }
        if (v.includes('Unregistered')) {
          return `Plate "${plate}" was cross-referenced against the vehicle registry database and returned no valid registration record. The vehicle may be unregistered, or the plate may not accurately represent the vehicle's actual registration.`;
        }
        if (v.includes('Invalid State Code')) {
          return `The state code in plate "${plate}" does not correspond to any valid Indian RTO state or UT code. This suggests the plate may be forged, belong to a different country's format, or have been tampered with.`;
        }
        return `Plate "${plate}" was flagged during automated detection. Further manual verification is recommended.`;
      }

      function riskScore(det) {
        let score = 0;
        const v = det.violation || '';
        // Violation severity weight (0-50)
        if (v.includes('Tampered'))         score += 50;
        else if (v.includes('Character'))   score += 40;
        else if (v.includes('Non-Standard')) score += 35;
        else if (v.includes('Spacing'))     score += 30;
        else if (v.includes('Unregistered')) score += 45;
        else if (v.includes('Pattern'))     score += 25;
        else if (v.includes('Invalid'))     score += 20;
        // Registration weight (0-30)
        const isReg = det.vehicle_info?.registered || det.vehicle_registered;
        if (!isReg) score += 30;
        // Confidence inverse weight (0-20): low confidence = risky
        const conf = det.confidence || 0;
        score += Math.round((1 - conf) * 20);
        score = Math.min(100, score);
        let label, color;
        if (score >= 70)      { label = 'HIGH';   color = C.red;    }
        else if (score >= 40) { label = 'MEDIUM'; color = C.orange; }
        else if (score >= 10) { label = 'LOW';    color = C.yellow; }
        else                  { label = 'NONE';   color = C.green;  }
        return { score, label, color };
      }

      // ═══════════════════════════════════════════════════════════
      //  PAGE 1 — Cover / Master Summary
      // ═══════════════════════════════════════════════════════════
      addPageHeader(doc, 'COVER PAGE');

      // Title block
      doc.setFillColor(...C.navy);
      doc.rect(0, 18, PW, 52, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(22); doc.setTextColor(...C.brand);
      doc.text('EvasionEye', PW / 2, 38, { align: 'center' });
      doc.setFontSize(13); doc.setTextColor(...C.white);
      doc.text('ANPR Security Detection Report', PW / 2, 47, { align: 'center' });
      doc.setFontSize(8); doc.setTextColor(...C.muted);
      doc.text(`Generated: ${dateStr} at ${timeStr}`, PW / 2, 54, { align: 'center' });
      doc.text(`Total Incidents: ${detections.length}`, PW / 2, 59, { align: 'center' });
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7); doc.setTextColor(...C.muted);
      doc.text('CONFIDENTIAL — FOR LAW ENFORCEMENT USE ONLY', PW / 2, 65, { align: 'center' });

      // Master summary stats
      const violations  = detections.filter(d => d.violation).length;
      const legal       = detections.length - violations;
      const registered  = detections.filter(d => d.vehicle_info?.registered || d.vehicle_registered).length;
      const avgConf     = detections.reduce((s, d) => s + (d.confidence || 0), 0) / detections.length;

      let y = 82;
      y = sectionTitle(doc, y, 'INCIDENT SUMMARY');

      doc.autoTable({
        startY: y,
        head: [['Metric', 'Value']],
        body: [
          ['Total Records Exported', detections.length],
          ['Violations Detected',    violations],
          ['Legal / No Violation',   legal],
          ['Registered Vehicles',    registered],
          ['Unregistered Vehicles',  detections.length - registered],
          ['Average Detection Confidence', Math.round(avgConf * 100) + '%'],
          ['Report Generated By',    'EvasionEye ANPR Monitoring System v2.0'],
          ['Detection Model',        'YOLOv8 License Plate Detector'],
          ['Recognition Method',     'PaddleOCR + Indian RTO Format Validation'],
        ],
        theme: 'grid',
        headStyles: { fillColor: C.brandDk, textColor: 255, fontSize: 8, fontStyle: 'bold' },
        bodyStyles: { fontSize: 8 },
        columnStyles: { 0: { fontStyle: 'bold', cellWidth: 80 }, 1: { cellWidth: 100 } },
        margin: { left: 10, right: 10 },
      });

      // Violation breakdown table
      y = doc.lastAutoTable.finalY + 10;
      y = sectionTitle(doc, y, 'VIOLATION BREAKDOWN');
      const violTypes = {};
      detections.forEach(d => {
        const vt = d.violation || 'None (Legal)';
        violTypes[vt] = (violTypes[vt] || 0) + 1;
      });
      const vtRows = Object.entries(violTypes).map(([type, count]) => [type, count, ((count / detections.length) * 100).toFixed(1) + '%']);
      doc.autoTable({
        startY: y,
        head: [['Violation Type', 'Count', 'Percentage']],
        body: vtRows,
        theme: 'striped',
        headStyles: { fillColor: C.brandDk, textColor: 255, fontSize: 8 },
        bodyStyles: { fontSize: 8 },
        margin: { left: 10, right: 10 },
        didParseCell(data) {
          if (data.section === 'body' && data.column.index === 0) {
            const v = data.cell.raw;
            data.cell.styles.textColor = v === 'None (Legal)' ? C.green : C.red;
            data.cell.styles.fontStyle = 'bold';
          }
        }
      });

      // Incident index
      y = doc.lastAutoTable.finalY + 10;
      if (y > PH - 50) { doc.addPage(); addPageHeader(doc, 'INCIDENT INDEX'); y = 22; }
      y = sectionTitle(doc, y, 'INCIDENT INDEX');
      const indexRows = detections.map((det, i) => [
        `INC-${String(i + 1).padStart(3, '0')}`,
        det.detected_plate || 'N/A',
        det.violation || 'None (Legal)',
        det.vehicle_info?.registered || det.vehicle_registered ? 'Registered' : 'Unregistered',
        Math.round((det.confidence || 0) * 100) + '%',
        `Page ${i + 3}`
      ]);
      doc.autoTable({
        startY: y,
        head: [['Incident ID', 'Plate', 'Violation', 'Status', 'Conf.', 'Page Ref']],
        body: indexRows,
        theme: 'striped',
        headStyles: { fillColor: C.brandDk, textColor: 255, fontSize: 8 },
        bodyStyles: { fontSize: 8 },
        margin: { left: 10, right: 10 },
        didParseCell(data) {
          if (data.section === 'body' && data.column.index === 2) {
            data.cell.styles.textColor = data.cell.raw === 'None (Legal)' ? C.green : C.red;
            data.cell.styles.fontStyle = 'bold';
          }
          if (data.section === 'body' && data.column.index === 3) {
            data.cell.styles.textColor = data.cell.raw === 'Registered' ? C.green : C.red;
          }
        }
      });

      addPageFooter(doc);

      // ═══════════════════════════════════════════════════════════
      //  PAGES 3+N — One Incident Per Page
      // ═══════════════════════════════════════════════════════════
      detections.forEach((det, idx) => {
        doc.addPage();
        const incId = `INC-${String(idx + 1).padStart(3, '0')}`;
        addPageHeader(doc, `INCIDENT ${incId}`);

        let y = 22;

        // ── Incident ID banner ──────────────────────────────────
        doc.setFillColor(...C.dark);
        doc.rect(10, y, PW - 20, 10, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10); doc.setTextColor(...C.brand);
        doc.text(incId, 14, y + 7);
        doc.setFontSize(8); doc.setTextColor(...C.white);
        doc.text(`Detected Plate: ${det.detected_plate || 'N/A'}`, 50, y + 4);
        doc.setFontSize(7); doc.setTextColor(...C.muted);
        const ts = det.timestamp ? new Date(det.timestamp).toLocaleString('en-IN') : 'N/A';
        doc.text(`Time: ${ts}`, 50, y + 8.5);
        const risk = riskScore(det);
        doc.setFillColor(...risk.color);
        doc.roundedRect(PW - 42, y + 1.5, 30, 7, 2, 2, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(7); doc.setTextColor(...C.white);
        doc.text(`RISK: ${risk.label} (${risk.score})`, PW - 27, y + 6, { align: 'center' });

        y += 15;

        // ── 2. Incident Summary Table ───────────────────────────
        y = sectionTitle(doc, y, '1. INCIDENT SUMMARY');
        const isReg = det.vehicle_info?.registered || det.vehicle_registered;
        const vStatus = isReg ? 'Registered' : 'Unregistered';
        const vType   = det.vehicle_info?.vehicle_type || det.vehicle_type || 'N/A';
        const owner   = det.vehicle_info?.owner_name || 'N/A';

        doc.autoTable({
          startY: y,
          body: [
            ['Detected Plate',   det.detected_plate || 'N/A',  'Frame No.',     `Frame ${det.frame ?? 'N/A'}`],
            ['Corrected Plate',  det.correct_plate || '— (No correction needed)', 'Timestamp', ts],
            ['Violation Type',   det.violation || 'None (Legal)',  'Vehicle Type',  vType],
            ['Vehicle Status',   vStatus,                          'Owner',         owner],
          ],
          theme: 'grid',
          bodyStyles: { fontSize: 8, valign: 'middle' },
          columnStyles: {
            0: { fontStyle: 'bold', cellWidth: 38, fillColor: C.light, textColor: C.dark },
            1: { cellWidth: 62 },
            2: { fontStyle: 'bold', cellWidth: 32, fillColor: C.light, textColor: C.dark },
            3: { cellWidth: 58 },
          },
          margin: { left: 10, right: 10 },
          didParseCell(data) {
            if (data.section === 'body' && data.column.index === 1 && data.row.index === 2) {
              const v = data.cell.raw;
              data.cell.styles.textColor = v === 'None (Legal)' ? C.green : C.red;
              data.cell.styles.fontStyle = 'bold';
            }
            if (data.section === 'body' && data.column.index === 1 && data.row.index === 3) {
              data.cell.styles.textColor = vStatus === 'Registered' ? C.green : C.red;
              data.cell.styles.fontStyle = 'bold';
            }
          }
        });
        y = doc.lastAutoTable.finalY + 6;

        // ── 3. Detection Evidence ───────────────────────────────
        y = sectionTitle(doc, y, '2. DETECTION EVIDENCE');
        if (det.plate_image && det.plate_image.startsWith('data:image')) {
          try {
            const imgW = 60, imgH = 20;
            doc.addImage(det.plate_image, 'JPEG', 10, y, imgW, imgH);
            doc.setDrawColor(...C.brand);
            doc.setLineWidth(0.5);
            doc.rect(10, y, imgW, imgH);
            doc.setFontSize(7); doc.setTextColor(...C.muted);
            doc.text('Captured Plate Crop', 10, y + imgH + 4);
            doc.setFont('helvetica', 'italic');
            doc.text('Bounding box region extracted by YOLOv8 detector', 10, y + imgH + 8);
            doc.setFont('helvetica', 'normal');
            y += imgH + 14;
          } catch(e) {
            doc.setFontSize(8); doc.setTextColor(...C.muted);
            doc.text('[Evidence image unavailable — capture may not have been saved]', 10, y + 6);
            y += 12;
          }
        } else {
          doc.setFontSize(8); doc.setTextColor(...C.muted);
          doc.text('[No evidence image captured for this detection]', 10, y + 6);
          y += 12;
        }

        // ── 4. Violation Analysis ───────────────────────────────
        y = sectionTitle(doc, y, '3. VIOLATION ANALYSIS');
        const explanation = violationAnalysis(det);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8); doc.setTextColor(...C.dark);
        const lines = doc.splitTextToSize(explanation, PW - 20);
        doc.text(lines, 10, y);
        y += lines.length * 4.5 + 4;

        // ── 5. Vehicle Registration Check ───────────────────────
        y = sectionTitle(doc, y, '4. VEHICLE REGISTRATION CHECK');
        if (isReg) { doc.setFillColor(220, 252, 231); } else { doc.setFillColor(254, 226, 226); }
        doc.roundedRect(10, y, PW - 20, 14, 2, 2, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(9); doc.setTextColor(...(isReg ? C.green : C.red));
        doc.text(isReg ? '✓ REGISTERED' : '✗ NOT REGISTERED', 16, y + 6);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8); doc.setTextColor(...C.dark);
        if (isReg) {
          doc.text(`Owner: ${owner}  |  Type: ${vType}  |  Plate matches registry record`, 16, y + 11);
        } else {
          doc.text('No matching record found in the vehicle registration database.', 16, y + 11);
        }
        y += 20;

        // ── 6. Confidence Visualization ─────────────────────────
        y = sectionTitle(doc, y, '5. DETECTION CONFIDENCE');
        const conf = det.confidence || 0;
        const confPct = Math.round(conf * 100);
        const barColor = confPct >= 80 ? C.green : confPct >= 50 ? C.orange : C.red;
        doc.setFontSize(8); doc.setTextColor(...C.dark);
        doc.text(`OCR Confidence: ${confPct}%`, 10, y + 3);
        drawProgressBar(doc, 10, y + 6, PW - 20, 5, conf, barColor);
        doc.setFontSize(7); doc.setTextColor(...C.muted);
        doc.text('0%', 10, y + 15);
        doc.text('50%', PW / 2, y + 15, { align: 'center' });
        doc.text('100%', PW - 10, y + 15, { align: 'right' });
        y += 22;

        // ── 7. Risk Assessment ──────────────────────────────────
        y = sectionTitle(doc, y, '6. RISK ASSESSMENT');
        doc.autoTable({
          startY: y,
          body: [
            ['Risk Score',          `${risk.score} / 100`],
            ['Risk Level',          risk.label],
            ['Violation Severity',  det.violation ? 'High' : 'None'],
            ['Registration Factor', isReg ? 'Registered (Low Risk)' : 'Unregistered (High Risk)'],
            ['Confidence Factor',   confPct >= 70 ? 'High confidence detection' : confPct >= 45 ? 'Medium confidence — verify manually' : 'Low confidence — manual review required'],
          ],
          theme: 'grid',
          bodyStyles: { fontSize: 8, valign: 'middle' },
          columnStyles: {
            0: { fontStyle: 'bold', cellWidth: 55, fillColor: C.light, textColor: C.dark },
            1: { cellWidth: 135 },
          },
          margin: { left: 10, right: 10 },
          didParseCell(data) {
            if (data.section === 'body' && data.column.index === 1 && data.row.index === 1) {
              data.cell.styles.textColor = risk.color;
              data.cell.styles.fontStyle = 'bold';
            }
          }
        });
        y = doc.lastAutoTable.finalY + 6;

        // ── 8. Technical Details ────────────────────────────────
        y = sectionTitle(doc, y, '7. TECHNICAL DETAILS');
        doc.autoTable({
          startY: y,
          body: [
            ['Detection Model',       'YOLOv8 License Plate Detector (license_plate_detector.pt)'],
            ['Input Resolution',      '320×320 px (speed-optimized mode)'],
            ['Recognition Method',    'PaddleOCR with Indian RTO Format Validation'],
            ['Validation Rules',      'Character Manipulation · Spacing · Pattern Match · Font Analysis'],
            ['Frame Processed',       `Frame ${det.frame ?? 'N/A'}`],
            ['Bounding Box',          det.bbox ? `[x:${det.bbox[0]}%, y:${det.bbox[1]}%, w:${det.bbox[2]}%, h:${det.bbox[3]}%]` : 'N/A'],
          ],
          theme: 'grid',
          bodyStyles: { fontSize: 7.5, valign: 'middle' },
          columnStyles: {
            0: { fontStyle: 'bold', cellWidth: 50, fillColor: C.light, textColor: C.dark },
            1: { cellWidth: 140 },
          },
          margin: { left: 10, right: 10 },
        });

        addPageFooter(doc);
      });

      // Update all footer page counts now that we know total pages
      const total = doc.internal.getNumberOfPages();
      for (let p = 1; p <= total; p++) {
        doc.setPage(p);
        doc.setFontSize(7); doc.setTextColor(...C.muted);
        doc.text(`Page ${p} of ${total}`, PW - 10, PH - 4, { align: 'right' });
      }

      const filename = `EvasionEye_Incident_Report_${now.toISOString().slice(0,10)}.pdf`;
      doc.save(filename);
    }
  </script>
</body>
</html>
