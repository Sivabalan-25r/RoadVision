<header class="header" id="header">

      <input type="text" placeholder="Search data..." id="header-search" />
    </div>
  </div>
  <div class="header-right">
    <a href="camera-profile.html" class="camera-profile-btn">
      <div class="camera-icon-wrapper">

    <a href="login.html" class="header-logout-btn" title="Logout">
