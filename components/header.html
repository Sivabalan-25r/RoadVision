<header class="header" id="header">
  <div class="header-left">
    <h2 id="page-title">Dashboard</h2>
    <div class="search-box">
      <span class="material-symbols-outlined">search</span>
      <input type="text" placeholder="Search data..." id="header-search" />
    </div>
  </div>
  <div class="header-right">
    <a href="camera-profile.html" class="camera-profile-btn" style="display:flex; align-items:center; gap:12px; padding:8px 16px; border-radius:var(--radius-lg); background:var(--surface-secondary); text-decoration:none; transition:all 0.2s;">
      <div style="display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:var(--radius-md); background:var(--primary-glow);">
        <span class="material-symbols-outlined" style="font-size:24px; color:var(--primary);">videocam</span>
      </div>
      <div style="text-align:left;">
        <div style="font-size:13px; font-weight:600; color:var(--text);" id="cameraName">Camera 1</div>
        <div style="font-size:11px; color:var(--text-muted);" id="cameraLocation">Click to set location</div>
      </div>
    </a>
  </div>
</header>

<script>
  // Load camera info from localStorage
  const cameraData = localStorage.getItem('roadvision_camera');
  if (cameraData) {
    try {
      const camera = JSON.parse(cameraData);
      document.getElementById('cameraName').textContent = camera.name || 'Camera 1';
      document.getElementById('cameraLocation').textContent = camera.location || 'Unknown Location';
    } catch (e) {
      console.error('Error loading camera data:', e);
    }
  } else {
    // Default camera data
    document.getElementById('cameraLocation').textContent = 'Click to set location';
  }
</script>
