<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoadVision — Login</title>
  <meta name="description" content="Sign in to RoadVision — AI-powered traffic analytics and illegal plate detection system." />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ---------- Login Card ---------- */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 16px;
    }

    .login-card {
      background: rgba(17, 24, 39, 0.6);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 36px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }

    /* ---------- Brand ---------- */
    .login-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    .login-brand-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(37,99,235,0.4);
    }

    .login-brand-text h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .login-brand-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ---------- Heading ---------- */
    .login-heading {
      margin-bottom: 28px;
    }

    .login-heading h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .login-heading p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ---------- Form ---------- */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input-wrap {
      position: relative;
    }

    .form-input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px 11px 44px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font-family);
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    .form-input:focus {
      border-color: var(--primary);
      background: rgba(37,99,235,0.05);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    /* ---------- Options Row ---------- */
    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: -4px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .forgot-link {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
      transition: opacity .2s;
    }

    .forgot-link:hover {
      opacity: 0.8;
    }

    /* ---------- Submit Button ---------- */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      font-family: var(--font-family);
      transition: background .2s, box-shadow .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(37,99,235,0.3);
      margin-top: 4px;
    }

    .btn-login:hover {
      background: var(--primary-hover);
      box-shadow: 0 6px 20px rgba(37,99,235,0.45);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    /* ---------- Divider ---------- */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    /* ---------- Footer ---------- */
    .login-footer {
      margin-top: 20px;
      text-align: center;
    }

    .login-status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 6px #22C55E;
      flex-shrink: 0;
    }

    .login-status-bar span {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
    }

    /* ---------- Error State ---------- */
    .login-error {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-md);
      color: var(--alert);
      font-size: 13px;
      font-weight: 500;
    }

    .login-error.show { display: flex; }
  </style>
</head>
<body>

  <!-- Dark Veil Background Slot -->
  <div id="dark-veil-slot"></div>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-brand-icon">
          <span class="material-symbols-outlined">visibility</span>
        </div>
        <div class="login-brand-text">
          <h1>RoadVision</h1>
          <p>Traffic Analytics Platform</p>
        </div>
      </div>

      <!-- Heading -->
      <div class="login-heading">
        <h2>Select Camera</h2>
        <p>Choose a camera to access its dashboard</p>
      </div>

      <!-- Error Banner -->
      <div class="login-error" id="loginError">
        <span class="material-symbols-outlined" style="font-size:18px">error</span>
        <span id="loginErrorText">Please select a camera to continue.</span>
      </div>

      <!-- Camera Selection -->
      <div class="login-form" id="cameraSelection">
        <div class="form-group">
          <label class="form-label">Available Cameras</label>
          <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="camera-select-btn" data-camera="1">
              <span class="material-symbols-outlined">videocam</span>
              <div>
                <div style="font-weight:600; font-size:14px;">Camera 1</div>
                <div style="font-size:12px; color:var(--text-muted);">Main Expressway North</div>
              </div>
              <span class="material-symbols-outlined" style="margin-left:auto; color:var(--success);">check_circle</span>
            </button>
            
            <button class="camera-select-btn" data-camera="2">
              <span class="material-symbols-outlined">videocam</span>
              <div>
                <div style="font-weight:600; font-size:14px;">Camera 2</div>
                <div style="font-size:12px; color:var(--text-muted);">City Center Junction</div>
              </div>
              <span class="material-symbols-outlined" style="margin-left:auto; color:var(--success);">check_circle</span>
            </button>
            
            <button class="camera-select-btn" data-camera="3">
              <span class="material-symbols-outlined">videocam</span>
              <div>
                <div style="font-weight:600; font-size:14px;">Camera 3</div>
                <div style="font-size:12px; color:var(--text-muted);">Highway Toll Plaza</div>
              </div>
              <span class="material-symbols-outlined" style="margin-left:auto; color:var(--success);">check_circle</span>
            </button>
            
            <button class="camera-select-btn" data-camera="4">
              <span class="material-symbols-outlined">videocam</span>
              <div>
                <div style="font-weight:600; font-size:14px;">Camera 4</div>
                <div style="font-size:12px; color:var(--text-muted);">Airport Road Entry</div>
              </div>
              <span class="material-symbols-outlined" style="margin-left:auto; color:var(--success);">check_circle</span>
            </button>
          </div>
        </div>
      </div>

      <style>
        .camera-select-btn {
          width: 100%;
          display: flex;
          align-items: center;
          gap: 14px;
          padding: 14px 16px;
          background: rgba(255,255,255,0.04);
          border: 1px solid var(--border-color);
          border-radius: var(--radius-md);
          color: var(--text-primary);
          font-family: var(--font-family);
          cursor: pointer;
          transition: all .2s;
          text-align: left;
        }
        
        .camera-select-btn:hover {
          background: rgba(37,99,235,0.1);
          border-color: var(--primary);
          transform: translateY(-2px);
        }
        
        .camera-select-btn .material-symbols-outlined:first-child {
          font-size: 28px;
          color: var(--primary);
        }
      </style>

      <!-- Status Bar -->
      <div class="login-status-bar">
        <span class="status-dot"></span>
        <span>SEC_NODE_01: ONLINE • AES-256-GCM ENCRYPTED</span>
      </div>

    </div>
  </div>

  <script>
    // ---- Inject Dark Veil background ----
    fetch('components/dark-veil.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('dark-veil-slot').innerHTML = html;
        import('./components/dark-veil.js').then(m => m.initDarkVeil());
      })
      .catch(() => {/* background unavailable — no-op */});

    // ---- Camera Selection Logic ----
    const errBox = document.getElementById('loginError');
    const cameraButtons = document.querySelectorAll('.camera-select-btn');

    cameraButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const cameraId = btn.dataset.camera;
        const cameraName = btn.querySelector('div > div:first-child').textContent;
        const cameraLocation = btn.querySelector('div > div:last-child').textContent;
        
        // Save camera selection to localStorage
        localStorage.setItem('roadvision_camera', JSON.stringify({
          id: `CAM-00${cameraId}`,
          name: cameraName,
          location: cameraLocation,
          resolution: '1080p',
          latitude: '',
          longitude: '',
          address: '',
          accuracy: '',
        }));
        
        // Redirect to dashboard
        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
